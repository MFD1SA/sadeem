<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0F1117"/>
  <defs>
    <linearGradient id="g" x1="44" y1="12" x2="18" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!--
    Standard S: top arc opens RIGHT (bulges left), bottom arc opens LEFT (bulges right).
    Traced as single stroke from upper-right to lower-left.
    Segment 1: top arc  — (44,12) curves UP across to (18,22)
    Segment 2: diagonal — (18,22) crosses to (46,42)
    Segment 3: bot arc  — (46,42) curves DOWN across to (20,52)
  -->
  <path
    d="M 44 12
       C 48 6, 16 6, 18 22
       C 20 32, 46 32, 46 42
       C 46 58, 16 58, 20 52"
    fill="none"
    stroke="url(#g)"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
